name = "hukuk-worker"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true

# R2 bucket — Cloudflare hukuk-pdf bucket'ına bağlı
[[r2_buckets]]
binding = "PDF_BUCKET"
bucket_name = "hukuk-pdf"

# D1 — production
[[d1_databases]]
binding = "DB"
database_name = "hukuk-db"
database_id = "9c7cb485-5daa-44c7-829a-5bdfe75f30d2"

# Vectorize index (1024-dim, bge-m3 multilingual native)
[[vectorize]]
binding = "VECTORIZE"
index_name = "hukuk-vectors"

# Workers AI binding (for embeddings via @cf/baai/bge-m3)
[ai]
binding = "AI"
